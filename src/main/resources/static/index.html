<!doctype html>
<html lang="en" style="background:#1b2838">
<head>
  <meta charset="UTF-8" />
  <meta name="color-scheme" content="dark" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Steam Analyzer</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1 class="title">
        <svg class="logo" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M11.979 0C5.678 0 .511 4.86.022 11.037l6.432 2.658c.545-.371 1.203-.59 1.912-.59.063 0 .125.004.188.006l2.861-4.142V8.91c0-2.495 2.028-4.524 4.524-4.524 2.494 0 4.524 2.031 4.524 4.527s-2.03 4.525-4.524 4.525h-.105l-4.076 2.911c0 .052.004.105.004.159 0 1.875-1.515 3.396-3.39 3.396-1.635 0-3.016-1.173-3.331-2.727L.436 15.27C1.862 20.307 6.486 24 11.979 24c6.627 0 11.999-5.373 11.999-12S18.605 0 11.979 0zM7.54 18.21l-1.473-.61c.262.543.714.999 1.314 1.25 1.297.539 2.793-.076 3.332-1.375.263-.63.264-1.319.005-1.949s-.75-1.121-1.377-1.383c-.624-.26-1.29-.249-1.878-.03l1.523.63c.956.4 1.409 1.5 1.009 2.455-.397.957-1.497 1.41-2.454 1.012zM18.955 8.907c0-1.662-1.353-3.015-3.015-3.015-1.665 0-3.015 1.353-3.015 3.015 0 1.665 1.35 3.015 3.015 3.015 1.663 0 3.015-1.35 3.015-3.015zm-5.273-.005c0-1.252 1.013-2.266 2.265-2.266 1.249 0 2.266 1.014 2.266 2.266 0 1.251-1.017 2.265-2.266 2.265-1.253 0-2.265-1.014-2.265-2.265z"/>
        </svg>
        Steam Analyzer
      </h1>
    </header>

    <form id="lookup" autocomplete="off">
      <input
        id="input"
        type="text"
        placeholder="Vanity name (steamcommunity.com/id/NAME) or 17-digit SteamID"
        aria-label="Steam vanity name or SteamID"
        required />
      <button type="submit" id="go">Analyze</button>
    </form>

    <p id="status" class="status" hidden></p>

    <div class="profile-row">
      <section id="profile" class="card profile" hidden>
        <img id="avatar" class="avatar" alt="" />
        <div>
          <a id="persona" class="persona" href="#" target="_blank" rel="noopener"></a>
          <div id="steamid" class="muted"></div>
        </div>
      </section>
      <section id="service-card" class="card yos" hidden>
        <div class="value" id="yos-value"></div>
        <div class="label">Years of Service</div>
      </section>
    </div>

    <section id="stats" class="stat-grid" hidden></section>

    <section id="next" class="card next" hidden>
      <h2>Play Next</h2>
      <div id="next-list" class="next-list"></div>
    </section>

    <section id="toggles" class="toggle-cards toggles" hidden>
      <div class="card toggle-card">
        <h2>Remove</h2>
        <div class="toggle-row">
          <button type="button" class="toggle" data-filter="free">Free</button>
          <button type="button" class="toggle" data-filter="tools">Tools</button>
          <button type="button" class="toggle" data-filter="played">Played</button>
        </div>
      </div>
      <div class="card toggle-card">
        <h2>Filters</h2>
        <div class="toggle-row">
          <button type="button" class="toggle" data-filter="underHour"
                  title="Count games under 1 hour as backlog / never played">Under 1h</button>
          <button type="button" class="toggle" data-filter="group"
                  title="Collapse likely sequels into one row">Group Games</button>
        </div>
      </div>
    </section>

    <section id="library-section" hidden>
      <div class="lib-head">
        <h2>Library</h2>
        <label class="sort">
          Sort
          <select id="sort">
            <option value="playtime">Most played</option>
            <option value="least">Least played</option>
            <option value="name">Name (A-Z)</option>
          </select>
        </label>
      </div>
      <table id="library-table" class="library">
        <thead>
          <tr><th>Game</th><th class="num">Hours</th></tr>
        </thead>
        <tbody id="library-body"></tbody>
      </table>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
